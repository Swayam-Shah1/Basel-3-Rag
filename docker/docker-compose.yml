services:

  app:
    build: .
    container_name: basel_rag_app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: basel_rag_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: basel_rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data: